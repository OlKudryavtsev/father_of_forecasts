<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Отец прогнозов</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/miniapp-static/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">Telegram Mini App</div>
        <h1>🏆 Отец прогнозов</h1>
      </div>
      <button id="refreshButton" class="icon-button" title="Обновить">↻</button>
    </header>

    <nav class="tabs" aria-label="Разделы">
      <button class="tab active" data-tab="home">Главная</button>
      <button class="tab" data-tab="predictions">Прогнозы</button>
      <button class="tab" data-tab="table">Таблица</button>
      <button class="tab" data-tab="tournament">Турнир</button>
      <button class="tab" data-tab="fun">Факты</button>
    </nav>

    <main>
      <section id="status" class="status hidden"></section>

      <section id="home" class="screen active"></section>
      <section id="predictions" class="screen"></section>
      <section id="table" class="screen"></section>
      <section id="tournament" class="screen"></section>
      <section id="fun" class="screen"></section>
    </main>
  </div>

  <template id="scoreEditorTemplate">
    <div class="score-editor">
      <button type="button" data-action="minus-home">−</button>
      <strong data-field="home">1</strong>
      <span>:</span>
      <strong data-field="away">1</strong>
      <button type="button" data-action="minus-away">−</button>
      <button type="button" data-action="plus-home">+</button>
      <button type="button" data-action="plus-away">+</button>
    </div>
  </template>

  <script src="/miniapp-static/app.js"></script>
</body>
</html>
