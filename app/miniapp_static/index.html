<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Отец прогнозов</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/miniapp-static/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="eyebrow">Турнирный портал</div>
        <h1>🏆 Отец прогнозов</h1>
      </div>
      <button id="refreshButton" class="icon-button" title="Обновить" aria-label="Обновить">↻</button>
    </header>

    <nav class="tabs" aria-label="Разделы">
      <button class="tab active" data-tab="home"><span class="tab-icon">🏠</span><span>Главная</span></button>
      <button class="tab" data-tab="predictions"><span class="tab-icon">🔮</span><span>Прогнозы</span></button>
      <button class="tab" data-tab="table"><span class="tab-icon">🏆</span><span>Таблица</span></button>
      <button class="tab" data-tab="tournament"><span class="tab-icon">🎯</span><span>Турнир</span></button>
      <button class="tab" data-tab="fun"><span class="tab-icon">🎮</span><span>Фан</span></button>
    </nav>

    <main>
      <section id="status" class="status hidden"></section>

      <section id="home" class="screen active"></section>
      <section id="predictions" class="screen"></section>
      <section id="table" class="screen"></section>
      <section id="tournament" class="screen"></section>
      <section id="fun" class="screen"></section>
    </main>
  </div>

  <script src="/miniapp-static/app.js"></script>
</body>
</html>
